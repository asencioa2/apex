<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Punishment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Inter:wght@400;500&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08090B;
      --surface:  #101318;
      --surface2: #181D26;
      --surface3: #1F2535;
      --accent:   #00C9A7;
      --danger:   #E8552A;
      --drink:    #D4920A;
      --danger-dim:  rgba(232,85,42,0.10);
      --danger-dim2: rgba(232,85,42,0.22);
      --drink-dim:   rgba(212,146,10,0.10);
      --drink-dim2:  rgba(212,146,10,0.22);
      --text-1: #EDF0F4;
      --text-2: #8A90A0;
      --text-3: #48526A;
      --border:   rgba(255,255,255,0.06);
      --border-m: rgba(255,255,255,0.10);
      --mode-color: var(--danger);
      --mode-dim:   var(--danger-dim);
      --mode-dim2:  var(--danger-dim2);
      --mode-text:  #F07555;
      --mode-toast-border: var(--danger);
    }

    body.drink-mode {
      --mode-color: var(--drink);
      --mode-dim:   var(--drink-dim);
      --mode-dim2:  var(--drink-dim2);
      --mode-text:  #E0A840;
      --mode-toast-border: var(--drink);
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,9,11,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-1);
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .stat-chip {
      background: var(--surface2);
      border: 0.5px solid var(--border-m);
      border-radius: 8px;
      padding: 5px 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .stat-chip-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; }
    .stat-chip-val {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      line-height: 1.1;
      color: var(--accent);
    }

    .reset-btn {
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--text-3);
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .reset-btn:hover { border-color: var(--mode-color); color: var(--mode-color); }

    /* ─── MODE TABS ─── */
    .mode-bar {
      border-bottom: 0.5px solid var(--border);
      padding: 0 24px;
      display: flex;
      gap: 0;
    }

    .mode-tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      margin-bottom: -0.5px;
    }
    .mode-tab:hover { color: var(--text-2); }
    .mode-tab.active-workout { color: var(--danger); border-bottom-color: var(--danger); }
    .mode-tab.active-drink   { color: var(--drink);  border-bottom-color: var(--drink);  }

    /* ─── KILL FEED ─── */
    #killfeed {
      position: fixed;
      top: 110px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: none;
      max-width: 260px;
    }

    .kf-toast {
      background: rgba(12,14,18,0.96);
      border: 0.5px solid var(--border-m);
      border-left: 2px solid var(--mode-toast-border);
      border-radius: 6px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: kf-in 0.18s ease forwards;
    }
    .kf-toast.leaving { animation: kf-out 0.25s ease forwards; }
    @keyframes kf-in  { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes kf-out { from { transform: translateX(0);    opacity: 1; } to { transform: translateX(16px); opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .kf-toast, .kf-toast.leaving { animation: none; } }

    .kf-icon { font-size: 16px; flex-shrink: 0; }
    .kf-event { font-size: 11px; color: var(--text-2); }
    .kf-punishment {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--mode-color);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ─── HERO ─── */
    .hero {
      display: grid;
      grid-template-columns: 250px 1fr;
      border-bottom: 0.5px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    .hero-left {
      padding: 36px 24px 28px;
      text-align: center;
      border-right: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
    }

    .hero-num {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: clamp(52px, 10vw, 88px);
      color: var(--text-1);
      line-height: 1;
      transition: color 0.4s;
    }
    .hero-num.has-debt { color: var(--mode-color); }

    .hero-sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.10em;
      margin-top: 8px;
      min-height: 20px;
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin-top: 14px;
      min-height: 28px;
    }

    .hero-hint { font-size: 12px; color: var(--text-3); }

    .hero-pill {
      background: var(--mode-dim);
      border: 0.5px solid rgba(255,255,255,0.10);
      border-radius: 99px;
      padding: 3px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--mode-text);
    }

    /* ─── SESSION LOG ─── */
    .hero-right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .log-header {
      padding: 12px 20px 10px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .log-header-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
    }

    .log-count-badge {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
    }

    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 20px 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface3) transparent;
    }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

    .log-empty {
      padding-top: 24px;
      font-size: 13px;
      color: var(--text-3);
      text-align: center;
    }

    .log-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 0.5px solid var(--border);
      animation: log-slide 0.18s ease forwards;
    }
    .log-entry:last-child { border-bottom: none; }
    @keyframes log-slide { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    @media (prefers-reduced-motion: reduce) { .log-entry { animation: none; } }

    .log-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }

    .log-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text-1);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-count-x {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }

    .log-punishment {
      font-size: 12px;
      color: var(--mode-text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ─── CONTENT ─── */
    .content {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 24px 140px;
    }

    .cat-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-top: 32px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cat-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    /* ─── EVENT CARD ─── */
    .event-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 14px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 5px;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .event-card:hover { border-color: var(--border-m); background: var(--surface2); }
    .event-card:active { transform: scale(0.97); transition: transform 0.08s; }
    .event-card.lit { border-color: color-mix(in srgb, var(--mode-color) 40%, transparent); background: var(--surface2); }

    .flash-overlay {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: color-mix(in srgb, var(--mode-color) 18%, transparent);
      opacity: 0;
      pointer-events: none;
      animation: flash 0.35s ease forwards;
    }
    @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
    .card-icon { font-size: 22px; }

    .card-count {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      background: var(--surface3);
      border-radius: 5px;
      padding: 2px 8px;
      color: var(--text-3);
      border: 0.5px solid transparent;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .card-count.active {
      background: var(--mode-dim2);
      color: var(--mode-text);
      border-color: color-mix(in srgb, var(--mode-color) 35%, transparent);
    }

    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-1);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .card-punishment { font-size: 12px; color: var(--text-2); margin-top: 1px; }
    .card-punishment b { color: var(--mode-text); font-weight: 500; }

    /* ─── DRINK TIER BADGES ─── */
    .drink-tier {
      display: inline-block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 7px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .tier-sip    { background: rgba(212,146,10,0.12); color: #C89020; border: 0.5px solid rgba(212,146,10,0.2); }
    .tier-drink  { background: rgba(212,146,10,0.20); color: #D4920A; border: 0.5px solid rgba(212,146,10,0.3); }
    .tier-finish { background: rgba(220,60,60,0.15);  color: #E05050; border: 0.5px solid rgba(220,60,60,0.28); }

    /* ─── BOTTOM TRAY ─── */
    .tray {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(8,9,11,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 0.5px solid var(--border);
      padding: 12px 24px 16px;
      z-index: 100;
    }
    .tray-inner { max-width: 820px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
    .tray-exercises { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; overflow: hidden; }
    .tray-empty { font-size: 13px; color: var(--text-3); }

    .ex-chip {
      background: var(--surface2);
      border: 0.5px solid var(--border-m);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
    }
    .ex-chip span { font-family: 'Space Mono', monospace; color: var(--text-1); font-size: 11px; }

    .tray-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }
    .tray-btn:hover:not(:disabled) { opacity: 0.85; }
    .tray-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    #circuit-btn  { background: var(--accent); color: #061210; }
    #circuit-btn.copied { background: var(--surface3); color: var(--accent); }

    #drink-clear-btn {
      background: var(--drink);
      color: #120A00;
    }

    .drink-warning {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 6px;
      text-align: center;
    }

    /* ─── MODE PANEL VISIBILITY ─── */
    #panel-workout { display: block; }
    #panel-drink   { display: none;  }
    #tray-workout  { display: flex;  }
    #tray-drink    { display: none;  }

    body.drink-mode #panel-workout { display: none;  }
    body.drink-mode #panel-drink   { display: block; }
    body.drink-mode #tray-workout  { display: none;  }
    body.drink-mode #tray-drink    { display: flex;  }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 720px) {
      .hero { grid-template-columns: 1fr; }
      .hero-left { border-right: none; border-bottom: 0.5px solid var(--border); padding: 28px 16px 20px; }
      .hero-right { max-height: 180px; }
      .log-list { padding: 4px 16px 8px; }
      .log-header { padding: 10px 16px 8px; }
    }
    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .logo { font-size: 17px; }
      .stat-chip { display: none; }
      .content { padding: 16px 16px 130px; }
      .events-grid { grid-template-columns: 1fr 1fr; }
      .mode-bar { padding: 0 16px; }
      .mode-tab { padding: 12px 14px; font-size: 13px; }
      .tray { padding: 10px 16px 14px; }
      .tray-btn { padding: 9px 14px; font-size: 14px; }
      #killfeed { max-width: 220px; right: 10px; }
    }
  </style>
</head>
<body>

<div id="killfeed" role="status" aria-live="polite"></div>

<header>
  <div class="logo">Apex <span>Punishment</span></div>
  <div class="header-right">
    <div class="stat-chip" id="chip-events">
      <span class="stat-chip-label">Events</span>
      <span class="stat-chip-val" id="header-events">0</span>
    </div>
    <div class="stat-chip" id="chip-main">
      <span class="stat-chip-label" id="chip-main-label">Reps owed</span>
      <span class="stat-chip-val" id="header-main">0</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</header>

<nav class="mode-bar" aria-label="Mode switcher">
  <button class="mode-tab active-workout" id="tab-workout" onclick="setMode('workout')">🏋️ Workout</button>
  <button class="mode-tab"               id="tab-drink"   onclick="setMode('drink')">🍺 Drinking game</button>
</nav>

<main>
  <section class="hero">
    <div class="hero-left">
      <p class="hero-eyebrow" id="hero-eyebrow">Damage report</p>
      <div class="hero-num" id="hero-num" aria-live="polite">0</div>
      <div class="hero-sub" id="hero-sub">reps owed this session</div>
      <div class="hero-pills" id="hero-pills">
        <span class="hero-hint">Tap an event below</span>
      </div>
    </div>
    <div class="hero-right">
      <div class="log-header">
        <span class="log-header-label">Session log</span>
        <span class="log-count-badge" id="log-count">0 events</span>
      </div>
      <div class="log-list" id="log-list">
        <p class="log-empty">No events yet — start playing</p>
      </div>
    </div>
  </section>

  <div class="content">
    <div id="panel-workout"></div>
    <div id="panel-drink"></div>
  </div>
</main>

<!-- Workout tray -->
<div class="tray" id="tray-workout" role="complementary" aria-label="Workout totals">
  <div class="tray-inner">
    <div class="tray-exercises" id="workout-chips">
      <span class="tray-empty">No debt yet — go get eliminated</span>
    </div>
    <button class="tray-btn" id="circuit-btn" disabled>Copy workout</button>
  </div>
</div>

<!-- Drink tray -->
<div class="tray" id="tray-drink" role="complementary" aria-label="Drink totals" style="padding-bottom: 20px;">
  <div class="tray-inner">
    <div class="tray-exercises" id="drink-chips">
      <span class="tray-empty">No drinks yet — go play a round</span>
    </div>
    <button class="tray-btn" id="drink-clear-btn" onclick="resetAll()">Clear tab</button>
  </div>
  <p class="drink-warning">🍺 Drink responsibly. Know your limits.</p>
</div>

<script>
/* ───────────────────────────────────────────
   DATA
─────────────────────────────────────────── */
const WORKOUT_EVENTS = [
  { id:'w_knocked',     cat:'death',        icon:'💥', name:'Got knocked',             punishment:'15 push-ups',     reps:15, unit:'push-ups'    },
  { id:'w_eliminated',  cat:'death',        icon:'💀', name:'Fully eliminated',         punishment:'20 squats',       reps:20, unit:'squats'       },
  { id:'w_first_down',  cat:'death',        icon:'😬', name:'First knocked in squad',   punishment:'10 burpees',      reps:10, unit:'burpees'      },
  { id:'w_thirsted',    cat:'death',        icon:'🪦', name:'Got thirsted',             punishment:'15 burpees',      reps:15, unit:'burpees'      },
  { id:'w_ring',        cat:'positioning',  icon:'🔴', name:'Died to the ring',         punishment:'25 jump squats',  reps:25, unit:'jump squats'  },
  { id:'w_hot_drop',    cat:'positioning',  icon:'🪂', name:'Died in hot drop',         punishment:'20 mtn climbers', reps:20, unit:'mtn climbers' },
  { id:'w_no_cover',    cat:'positioning',  icon:'🫣', name:'Fought with no cover',     punishment:'15 lunges/leg',   reps:15, unit:'lunges/leg'   },
  { id:'w_no_kills',    cat:'squad',        icon:'0️⃣', name:'Zero kills in a match',    punishment:'30 push-ups',     reps:30, unit:'push-ups'    },
  { id:'w_banner',      cat:'squad',        icon:'🚩', name:'Teammate banner expired',  punishment:'20 dips',         reps:20, unit:'dips'         },
  { id:'w_left_behind', cat:'squad',        icon:'🏃', name:'Left squad behind',        punishment:'1-min wall sit',  reps:1,  unit:'min wall sit' },
  { id:'w_tf',          cat:'squad',        icon:'🤦', name:'Shot own teammate',        punishment:'10 burpees',      reps:10, unit:'burpees'      },
  { id:'w_headshot',    cat:'humiliation',  icon:'🎯', name:'Got one-shotted',          punishment:'20 V-ups',        reps:20, unit:'V-ups'        },
  { id:'w_melee',       cat:'humiliation',  icon:'👊', name:'Killed by melee only',     punishment:'15 burpees',      reps:15, unit:'burpees'      },
  { id:'w_champ',       cat:'humiliation',  icon:'👑', name:'Killed by champion squad', punishment:'10 pull-ups',     reps:10, unit:'pull-ups'     },
  { id:'w_loss_streak', cat:'humiliation',  icon:'🔥', name:'3-game loss streak',       punishment:'50 push-ups',     reps:50, unit:'push-ups'    },
];

const DRINK_EVENTS = [
  { id:'d_knocked',     cat:'death',        icon:'💥', name:'Got knocked',             punishment:'1 sip',       sips:1,  type:'sip'    },
  { id:'d_eliminated',  cat:'death',        icon:'💀', name:'Fully eliminated',         punishment:'2 sips',      sips:2,  type:'sip'    },
  { id:'d_first_down',  cat:'death',        icon:'😬', name:'First knocked in squad',   punishment:'1 drink',     sips:4,  type:'drink'  },
  { id:'d_thirsted',    cat:'death',        icon:'🪦', name:'Got thirsted',             punishment:'2 sips',      sips:2,  type:'sip'    },
  { id:'d_ring',        cat:'positioning',  icon:'🔴', name:'Died to the ring',         punishment:'1 drink',     sips:4,  type:'drink'  },
  { id:'d_hot_drop',    cat:'positioning',  icon:'🪂', name:'Died in hot drop',         punishment:'1 sip',       sips:1,  type:'sip'    },
  { id:'d_no_cover',    cat:'positioning',  icon:'🫣', name:'Fought with no cover',     punishment:'1 sip',       sips:1,  type:'sip'    },
  { id:'d_no_kills',    cat:'squad',        icon:'0️⃣', name:'Zero kills in a match',    punishment:'2 sips',      sips:2,  type:'sip'    },
  { id:'d_banner',      cat:'squad',        icon:'🚩', name:'Teammate banner expired',  punishment:'1 drink',     sips:4,  type:'drink'  },
  { id:'d_left_behind', cat:'squad',        icon:'🏃', name:'Left squad behind',        punishment:'1 drink',     sips:4,  type:'drink'  },
  { id:'d_tf',          cat:'squad',        icon:'🤦', name:'Shot own teammate',        punishment:'2 drinks',    sips:8,  type:'drink'  },
  { id:'d_headshot',    cat:'humiliation',  icon:'🎯', name:'Got one-shotted',          punishment:'1 sip',       sips:1,  type:'sip'    },
  { id:'d_melee',       cat:'humiliation',  icon:'👊', name:'Killed by melee only',     punishment:'1 drink',     sips:4,  type:'drink'  },
  { id:'d_champ',       cat:'humiliation',  icon:'👑', name:'Killed by champion squad', punishment:'2 sips',      sips:2,  type:'sip'    },
  { id:'d_loss_streak', cat:'humiliation',  icon:'🔥', name:'3-game loss streak',       punishment:'Finish it',   sips:12, type:'finish' },
];

const CATS = [
  { id:'death',       label:'💀 Death & knockdowns' },
  { id:'positioning', label:'🏃 Positioning crimes'  },
  { id:'squad',       label:'🤝 Squad failures'      },
  { id:'humiliation', label:'🔥 Humiliation tier'    },
];

const TIER_BADGE = {
  sip:    '<span class="drink-tier tier-sip">Sip</span>',
  drink:  '<span class="drink-tier tier-drink">Drink</span>',
  finish: '<span class="drink-tier tier-finish">Finish it</span>',
};

let mode = 'workout';
const wCounts = Object.fromEntries(WORKOUT_EVENTS.map(e => [e.id, 0]));
const dCounts = Object.fromEntries(DRINK_EVENTS.map(e =>  [e.id, 0]));
const wLog = []; // tracks first-click order of event IDs
const dLog = []; // tracks first-click order of event IDs

/* ───────────────────────────────────────────
   BUILD DOM
─────────────────────────────────────────── */
function buildPanel(panelId, events, prefix) {
  const panel = document.getElementById(panelId);
  CATS.forEach(cat => {
    const catEvents = events.filter(e => e.cat === cat.id);
    if (!catEvents.length) return;

    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat.label;
    panel.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'events-grid';

    catEvents.forEach(ev => {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.id = prefix + '-card-' + ev.id;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', ev.name + ': ' + ev.punishment);

      const tierBadge = ev.type ? TIER_BADGE[ev.type] : '';
      card.innerHTML = `
        <div class="card-top">
          <span class="card-icon" aria-hidden="true">${ev.icon}</span>
          <span class="card-count" id="${prefix}-count-${ev.id}">0</span>
        </div>
        <div class="card-name">${ev.name}</div>
        <div class="card-punishment">→ <b>${ev.punishment}</b></div>
        ${tierBadge}
      `;

      const handler = () => logEvent(ev, prefix);
      card.addEventListener('click', handler);
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(); } });
      grid.appendChild(card);
    });

    panel.appendChild(grid);
  });
}

buildPanel('panel-workout', WORKOUT_EVENTS, 'w');
buildPanel('panel-drink',   DRINK_EVENTS,   'd');

/* ───────────────────────────────────────────
   MODE SWITCH
─────────────────────────────────────────── */
function setMode(m) {
  mode = m;
  document.body.classList.toggle('drink-mode', m === 'drink');

  document.getElementById('tab-workout').className = 'mode-tab' + (m === 'workout' ? ' active-workout' : '');
  document.getElementById('tab-drink').className   = 'mode-tab' + (m === 'drink'   ? ' active-drink'   : '');

  updateUI();
}

/* ───────────────────────────────────────────
   LOG EVENT
─────────────────────────────────────────── */
function logEvent(ev, prefix) {
  const counts = prefix === 'w' ? wCounts : dCounts;
  const log    = prefix === 'w' ? wLog    : dLog;
  const wasZero = counts[ev.id] === 0;
  counts[ev.id]++;
  if (wasZero) log.push(ev.id); // only track first appearance

  const countEl = document.getElementById(prefix + '-count-' + ev.id);
  countEl.textContent = counts[ev.id];
  countEl.className = 'card-count active';

  const card = document.getElementById(prefix + '-card-' + ev.id);
  card.classList.add('lit');

  const flash = document.createElement('div');
  flash.className = 'flash-overlay';
  card.appendChild(flash);
  flash.addEventListener('animationend', () => flash.remove());

  showToast(ev);
  updateUI();
}

/* ───────────────────────────────────────────
   TOAST
─────────────────────────────────────────── */
function showToast(ev) {
  const feed = document.getElementById('killfeed');
  const toast = document.createElement('div');
  toast.className = 'kf-toast';
  toast.innerHTML = `
    <span class="kf-icon" aria-hidden="true">${ev.icon}</span>
    <div>
      <div class="kf-event">${ev.name}</div>
      <div class="kf-punishment">+${ev.punishment}</div>
    </div>
  `;
  feed.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 280);
  }, 2400);
}

/* ───────────────────────────────────────────
   RENDER LOG
─────────────────────────────────────────── */
function drinkTotal(ev, count) {
  if (ev.type === 'finish') return count === 1 ? 'Finish it' : `Finish it ×${count}`;
  const total = ev.sips * count;
  if (ev.type === 'sip')   return `${total} sip${total !== 1 ? 's' : ''}`;
  if (ev.type === 'drink')  return `${total / 4} drink${total / 4 !== 1 ? 's' : ''}`;
  return ev.punishment;
}

function renderLog() {
  const isWorkout = mode === 'workout';
  const logOrder  = isWorkout ? wLog : dLog;
  const counts    = isWorkout ? wCounts : dCounts;
  const events    = isWorkout ? WORKOUT_EVENTS : DRINK_EVENTS;
  const logList   = document.getElementById('log-list');
  const logCount  = document.getElementById('log-count');

  const total = logOrder.length;
  logCount.textContent = total + (total === 1 ? ' event' : ' events');

  if (total === 0) {
    logList.innerHTML = '<p class="log-empty">No events yet — start playing</p>';
    return;
  }

  logList.innerHTML = logOrder.map(id => {
    const ev    = events.find(e => e.id === id);
    const count = counts[id];
    const totalLabel = isWorkout
      ? `${count * ev.reps} ${ev.unit}`
      : drinkTotal(ev, count);

    return `
      <div class="log-entry">
        <span class="log-icon">${ev.icon}</span>
        <span class="log-name">${ev.name}</span>
        <span class="log-count-x">×${count}</span>
        <span class="log-punishment">${totalLabel}</span>
      </div>
    `;
  }).join('');
}

/* ───────────────────────────────────────────
   UPDATE UI
─────────────────────────────────────────── */
function updateUI() {
  if (mode === 'workout') updateWorkoutUI();
  else updateDrinkUI();
  renderLog();
}

function updateWorkoutUI() {
  const totals = {};
  WORKOUT_EVENTS.forEach(e => {
    if (wCounts[e.id] > 0) totals[e.unit] = (totals[e.unit] || 0) + wCounts[e.id] * e.reps;
  });
  const entries = Object.entries(totals);
  const totalEvents = Object.values(wCounts).reduce((a,b) => a+b, 0);
  const totalReps = entries.reduce((s,[k,v]) => k === 'min wall sit' ? s : s+v, 0);
  const wallSit = totals['min wall sit'];

  document.getElementById('header-events').textContent = totalEvents;
  document.getElementById('header-main').textContent = totalReps;
  document.getElementById('chip-main-label').textContent = 'Reps owed';
  document.getElementById('hero-eyebrow').textContent = 'Damage report';

  const heroNum = document.getElementById('hero-num');
  const heroSub = document.getElementById('hero-sub');
  const heroPills = document.getElementById('hero-pills');

  if (totalEvents === 0) {
    heroNum.textContent = '0';
    heroNum.classList.remove('has-debt');
    heroSub.textContent = 'reps owed this session';
    heroPills.innerHTML = '<span class="hero-hint">Tap an event below to start logging</span>';
  } else {
    heroNum.textContent = totalReps;
    heroNum.classList.add('has-debt');
    heroSub.textContent = 'reps owed' + (wallSit ? ` + ${wallSit} min wall sit` : '');
    heroPills.innerHTML = entries.map(([k,v]) => `<span class="hero-pill">${v} ${k}</span>`).join('');
  }

  const chips = document.getElementById('workout-chips');
  const btn = document.getElementById('circuit-btn');
  if (entries.length === 0) {
    chips.innerHTML = '<span class="tray-empty">No debt yet — go get eliminated</span>';
    btn.disabled = true;
  } else {
    chips.innerHTML = entries.map(([k,v]) => `<div class="ex-chip"><span>${v}</span>&nbsp;${k}</div>`).join('');
    btn.disabled = false;
  }
}

function updateDrinkUI() {
  let totalSips = 0, sipCount = 0, drinkCount = 0, finishCount = 0;
  DRINK_EVENTS.forEach(e => {
    const n = dCounts[e.id];
    if (n > 0) {
      totalSips += n * e.sips;
      if (e.type === 'sip')    sipCount    += n;
      if (e.type === 'drink')  drinkCount  += n;
      if (e.type === 'finish') finishCount += n;
    }
  });
  const totalEvents = Object.values(dCounts).reduce((a,b) => a+b, 0);

  document.getElementById('header-events').textContent = totalEvents;
  document.getElementById('header-main').textContent = totalSips;
  document.getElementById('chip-main-label').textContent = 'Sip units';
  document.getElementById('hero-eyebrow').textContent = 'Drink report';

  const heroNum = document.getElementById('hero-num');
  const heroSub = document.getElementById('hero-sub');
  const heroPills = document.getElementById('hero-pills');

  if (totalEvents === 0) {
    heroNum.textContent = '0';
    heroNum.classList.remove('has-debt');
    heroSub.textContent = 'drinks owed this session';
    heroPills.innerHTML = '<span class="hero-hint">Tap an event below to start logging</span>';
  } else {
    heroNum.textContent = totalSips;
    heroNum.classList.add('has-debt');
    heroSub.textContent = 'sip units consumed';
    const parts = [];
    if (sipCount)    parts.push(`${sipCount} sip${sipCount > 1 ? 's' : ''}`);
    if (drinkCount)  parts.push(`${drinkCount} drink${drinkCount > 1 ? 's' : ''}`);
    if (finishCount) parts.push(`${finishCount} finish`);
    heroPills.innerHTML = parts.map(p => `<span class="hero-pill">${p}</span>`).join('');
  }

  const chips = document.getElementById('drink-chips');
  if (totalEvents === 0) {
    chips.innerHTML = '<span class="tray-empty">No drinks yet — go play a round</span>';
  } else {
    const parts = [];
    if (sipCount)    parts.push(`<div class="ex-chip"><span>${sipCount}</span>&nbsp;sip${sipCount>1?'s':''}</div>`);
    if (drinkCount)  parts.push(`<div class="ex-chip"><span>${drinkCount}</span>&nbsp;drink${drinkCount>1?'s':''}</div>`);
    if (finishCount) parts.push(`<div class="ex-chip"><span>${finishCount}</span>&nbsp;finish</div>`);
    chips.innerHTML = parts.join('');
  }
}

/* ───────────────────────────────────────────
   RESET
─────────────────────────────────────────── */
function resetAll() {
  if (mode === 'workout') {
    wLog.length = 0;
    WORKOUT_EVENTS.forEach(e => {
      wCounts[e.id] = 0;
      const c = document.getElementById('w-count-' + e.id);
      if (c) { c.textContent = '0'; c.className = 'card-count'; }
      const card = document.getElementById('w-card-' + e.id);
      if (card) card.classList.remove('lit');
    });
  } else {
    dLog.length = 0;
    DRINK_EVENTS.forEach(e => {
      dCounts[e.id] = 0;
      const c = document.getElementById('d-count-' + e.id);
      if (c) { c.textContent = '0'; c.className = 'card-count'; }
      const card = document.getElementById('d-card-' + e.id);
      if (card) card.classList.remove('lit');
    });
  }
  updateUI();
}

/* ───────────────────────────────────────────
   COPY WORKOUT
─────────────────────────────────────────── */
document.getElementById('circuit-btn').addEventListener('click', () => {
  const totals = {};
  WORKOUT_EVENTS.forEach(e => {
    if (wCounts[e.id] > 0) totals[e.unit] = (totals[e.unit] || 0) + wCounts[e.id] * e.reps;
  });
  const summary = Object.entries(totals).map(([k,v]) => `${v} ${k}`).join(', ');
  const prompt = `Build me a post-Apex circuit workout. I owe: ${summary}. I have an advanced fitness level. Organize as supersets with short rest intervals.`;

  navigator.clipboard.writeText(prompt).then(() => {
    const btn = document.getElementById('circuit-btn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy workout'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => alert(prompt));
});
</script>
